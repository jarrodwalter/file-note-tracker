<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JW Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;
    --text:#e8e8e8;--muted:#666;--accent:#c8f560;--accent-dim:rgba(200,245,96,0.10);
    --done-text:#444;--morning:#f5a623;--afternoon:#50c8f5;--evening:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px;}
  .nav{max-width:760px;margin:0 auto;padding:20px 20px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .nav-brand{font-size:16px;font-weight:600;margin-right:auto;}
  .nav-tab{padding:6px 18px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--muted);user-select:none;transition:all 0.15s;}
  .nav-tab.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
  .sync{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-left:4px;}
  .sync.syncing{color:var(--morning);}
  .sync.synced{color:var(--accent);}
  .page{display:none;max-width:760px;margin:0 auto;padding:20px;}
  .page.active{display:block;}

  /* LAYOUT: daily tasks = 2 col on wide, 1 col on narrow */
  .dt-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:600px){.dt-layout{grid-template-columns:1fr;}}
  .dt-left{}
  .dt-right{}

  /* GROUPS */
  .group{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px;}
  .group.drag-over{border-color:var(--accent);background:rgba(200,245,96,0.03);}
  .gh{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
  .gh:hover{background:var(--surface2);}
  .gdot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .gdot.muted{background:#555;}
  .gtitle{font-size:13px;font-weight:500;flex:1;}
  .gbadge{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .chev{font-size:9px;color:var(--muted);transition:transform 0.2s;}
  .chev.open{transform:rotate(90deg);}
  .gbody{display:none;border-top:1px solid var(--border);}
  .gbody.open{display:block;}

  /* ROWS */
  .nr{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);cursor:grab;transition:background 0.15s;}
  .nr:last-child{border-bottom:none;}
  .nr:hover{background:var(--surface2);}
  .nr.dragging{opacity:0.3;}
  .nr.done .nn{color:var(--done-text);text-decoration:line-through;}
  .dh{color:#444;font-size:12px;cursor:grab;flex-shrink:0;}
  .nn{font-size:13px;flex:1;cursor:text;}
  .nn:hover{color:var(--accent);}
  .nedit{font-size:13px;flex:1;background:var(--surface2);border:1px solid var(--accent);border-radius:4px;padding:2px 6px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;}
  .cb{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border);appearance:none;-webkit-appearance:none;cursor:pointer;flex-shrink:0;position:relative;transition:all 0.15s;}
  .cb:checked{border-color:var(--accent);background:var(--accent);}
  .cb:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8px;color:#000;font-weight:800;}
  .delbtn{color:#444;font-size:13px;cursor:pointer;background:none;border:none;padding:0 2px;transition:color 0.15s;flex-shrink:0;}
  .delbtn:hover{color:#ff5555;}
  .donedate{font-family:'DM Mono',monospace;font-size:10px;color:#555;flex-shrink:0;}
  .fn-tag{font-size:9px;background:var(--accent-dim);color:var(--accent);border-radius:3px;padding:1px 5px;font-family:'DM Mono',monospace;flex-shrink:0;}
  .empty{padding:12px 14px;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;}

  /* FN stats */
  .ph{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;}
  .ph h2{font-size:18px;font-weight:600;}
  .bignum{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--accent);line-height:1;text-align:right;}
  .biglabel{font-size:11px;color:var(--muted);text-align:right;}
  .prog-wrap{background:var(--border);border-radius:2px;height:3px;margin-bottom:12px;}
  .prog-fill{height:3px;background:var(--accent);border-radius:2px;transition:width 0.4s;width:0%;}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .sp{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .sp strong{font-size:15px;display:block;font-weight:500;color:var(--accent);}

  /* DATE NAV */
  .date-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
  .dnav{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--text);font-size:16px;cursor:pointer;flex-shrink:0;}
  .dnav:hover{border-color:var(--accent);}
  .dinput{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;flex:1;cursor:pointer;}
  .dinput:focus{border-color:var(--accent);}
  .todaybtn{background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;}
  .todaybtn:hover{background:var(--accent);color:#000;}
  .daylabel{font-size:15px;font-weight:600;margin-bottom:14px;}

  /* BLOCK HEADER */
  .bh{padding:9px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
  .bdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .btitle{font-size:13px;font-weight:500;flex:1;}
  .block-body{min-height:40px;}
  .block-body.drag-over{background:rgba(200,245,96,0.04);}
  .inline-add{display:flex;gap:6px;padding:7px 14px;}
  .inline-add input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
  .inline-add input:focus{border-color:var(--accent);}
  .inline-add button{background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;}
  .inline-add button:hover{background:var(--accent);color:#000;}

  /* FN PANEL (right side on daily tasks) */
  .fn-panel-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;padding:0 2px;}
  .fn-mini-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);cursor:grab;transition:background 0.15s;}
  .fn-mini-row:last-child{border-bottom:none;}
  .fn-mini-row:hover{background:var(--surface2);}
  .fn-mini-row.dragging{opacity:0.3;}
  .fn-mini-name{font-size:12px;flex:1;color:var(--text);}
  .fn-mini-hint{font-size:10px;color:#555;font-family:'DM Mono',monospace;}

  /* MODAL */
  .modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;}
  .modal-wrap.show{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;width:340px;}
  .modal h3{font-size:15px;font-weight:600;margin-bottom:14px;}
  .modal input,.modal select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;}
  .modal input:focus,.modal select:focus{border-color:var(--accent);}
  .modal select{margin-bottom:14px;}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end;}
  .btn-c{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:7px 14px;font-size:13px;cursor:pointer;}
  .btn-a{background:var(--accent);border:none;color:#000;border-radius:6px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;}

  /* date edit modal */
  .date-modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;}
  .date-modal-wrap.show{display:flex;}

  .fab{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#000;border:none;border-radius:50px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(200,245,96,0.25);font-family:'DM Sans',sans-serif;z-index:50;}
  .fab:hover{transform:scale(1.04);}
  .loading{padding:60px 20px;text-align:center;font-family:'DM Mono',monospace;color:var(--muted);font-size:13px;}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-brand">JW Tracker</div>
  <div class="nav-tab active" id="tab-dt" onclick="switchTab('dt')">Daily Tasks</div>
  <div class="nav-tab" id="tab-fn" onclick="switchTab('fn')">File Notes</div>
  <div class="sync" id="sync">connecting...</div>
</div>

<!-- DAILY TASKS -->
<div class="page active" id="page-dt">
  <div class="date-row">
    <button class="dnav" onclick="chDate(-1)">‹</button>
    <input type="date" class="dinput" id="dinput" onchange="onDChange()">
    <button class="dnav" onclick="chDate(1)">›</button>
    <button class="todaybtn" onclick="goToday()">Today</button>
  </div>
  <div class="daylabel" id="daylabel"></div>
  <div class="dt-layout">
    <div class="dt-left" id="dt-blocks"></div>
    <div class="dt-right">
      <div class="fn-panel-title">File Notes — drag to schedule</div>
      <div class="group" id="fn-panel">
        <div id="fn-panel-body"></div>
      </div>
    </div>
  </div>
</div>

<!-- FILE NOTES -->
<div class="page" id="page-fn">
  <div class="ph">
    <div><h2>File Notes</h2></div>
    <div><div class="bignum" id="fn-pct">0%</div><div class="biglabel">complete</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="fn-prog"></div></div>
  <div class="stats">
    <div class="sp"><strong id="fn-done">0</strong>done</div>
    <div class="sp"><strong id="fn-rem">0</strong>remaining</div>
    <div class="sp"><strong id="fn-total">0</strong>total</div>
  </div>
  <div id="fn-load" class="loading">Loading...</div>
  <div id="fn-cont" style="display:none"></div>
</div>

<!-- ADD NOTE MODAL -->
<div class="modal-wrap" id="modal">
  <div class="modal">
    <h3>Add File Note</h3>
    <input type="text" id="m-name" placeholder="Client name...">
    <div class="modal-btns">
      <button class="btn-c" onclick="closeModal()">Cancel</button>
      <button class="btn-a" onclick="addNote()">Add</button>
    </div>
  </div>
</div>

<!-- DATE EDIT MODAL -->
<div class="date-modal-wrap" id="date-modal">
  <div class="modal">
    <h3>Set completion date</h3>
    <input type="date" id="dm-date">
    <div class="modal-btns">
      <button class="btn-c" onclick="closeDateModal()">Cancel</button>
      <button class="btn-a" onclick="saveDateModal()">Save</button>
    </div>
  </div>
</div>

<button class="fab" id="fab" onclick="openModal()">+ Add Note</button>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

(function(){
  const k='jw_auth2';
  if(sessionStorage.getItem(k)==='ok')return;
  document.body.style.display='none';
  const p=prompt('Enter password:');
  if(p==='Lachlan'){sessionStorage.setItem(k,'ok');document.body.style.display='';}
  else{document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#666;">Access denied.</div>';document.body.style.display='';}
})();

const app=initializeApp({databaseURL:'https://file-note-tracker-default-rtdb.asia-southeast1.firebasedatabase.app'});
const db=getDatabase(app);
const fnRef=ref(db,'jw_filenotes');
const dtRef=ref(db,'jw_dailytasks');

function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(str){const d=new Date(str+'T00:00:00');return d.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function fmtShort(str){if(!str)return '';const d=new Date(str+'T00:00:00');return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});}
function setSync(s){const el=document.getElementById('sync');if(s==='syncing'){el.textContent='saving...';el.className='sync syncing';}else if(s==='synced'){el.textContent='✓ synced';el.className='sync synced';}else{el.textContent='connecting...';el.className='sync';}}

const ALL_NOTES=[
  'Singer, Campbell & Priscilla',"D'Costa, Craig",'Gemell, Chris','Matwijow, Peter & Janice',
  'Pickup (Will & Lee)','Whisker, Matthew','Frias Diaz, Carlos & Sophie Diller','Sargeant, Susan',
  'Whichelow, Mark','Bates, Rohan','Bulters, Gerard & Sue','Gordon, Paul','Hodge, Greg',
  'Baskus, Deb','Shvarts, Izya and Feyga','Curran, Sean','Kowalski, Krystyna','Leech, Jen and Nick',
  'Mascord, Cathie','Laman, Peter & Sue','Winterflood, Alison','Neil and Corin','Hunt, Tony',
  "O'Connell, John",'Marshall, Rob','Purcell, Andrew & Rahneida','Cook, Nathan','Stewart, Charlie',
  'Peterson, Trent','Jenkins, Graeme','McKenna, Mark',"O'Donoghue, Sally",'Phillips, Clive',
  'Sebastian, Ray','Sit, Brendan','Holehouse, James','Wilkinson, Paul','Wood, Ross','Chan, Mark',
  'Baldwin, Scott','Edelstein, Jason','McGuiness, David','Lavery, Thomas','Tregoning, Paul',
  'Middleton, Brian','Vardabasso, Monica','Soire, Daniel','Ilijic, Matt','Wright, Daniel',
  'Meale, David','Gillies, David'
];

let fnData={todo:[],done:[]};
let dtData={};
let fnSaving=false,dtSaving=false;
let curDate=todayStr();
let dragFNNote=null; // file note being dragged to daily task
let dateModalNote=null; // note whose date we're editing

function defaultFN(){return{todo:ALL_NOTES.map(n=>({name:n})),done:[]};}

// ── FILE NOTES ─────────────────────────────────────────────
function saveFN(){fnSaving=true;setSync('syncing');set(fnRef,fnData).then(()=>{setSync('synced');fnSaving=false;});}

function markFNDone(name, date){
  const idx=fnData.todo.findIndex(n=>n.name===name);
  if(idx!==-1){
    fnData.todo.splice(idx,1);
    fnData.done.unshift({name,date:date||todayStr()});
    saveFN();renderFN();updateFNStats();renderFNPanel();
  }
}

function markFNUndone(name){
  const idx=fnData.done.findIndex(n=>n.name===name);
  if(idx!==-1){
    fnData.done.splice(idx,1);
    fnData.todo.push({name});
    saveFN();renderFN();updateFNStats();renderFNPanel();
  }
}

function renderFN(){
  const cont=document.getElementById('fn-cont');
  cont.innerHTML='';
  document.getElementById('fn-load').style.display='none';
  cont.style.display='block';

  // TO DO
  const tg=makeCollapsible('To Do',(fnData.todo||[]).length+' remaining',false,true);
  (fnData.todo||[]).forEach(note=>{
    const row=document.createElement('div');row.className='nr';row.draggable=true;
    row.innerHTML=`<span class="dh">⠿</span><span class="nn">${note.name}</span><button class="delbtn" title="Delete">✕</button>`;
    row.querySelector('.nn').addEventListener('click',e=>{
      e.stopPropagation();const span=e.target;
      const inp=document.createElement('input');inp.className='nedit';inp.value=note.name;
      span.replaceWith(inp);inp.focus();inp.select();row.draggable=false;
      const fin=()=>{const v=inp.value.trim();if(v&&v!==note.name){note.name=v;saveFN();}row.draggable=true;renderFN();renderFNPanel();};
      inp.addEventListener('blur',fin);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=note.name;inp.blur();}});
    });
    row.querySelector('.delbtn').addEventListener('click',e=>{
      e.stopPropagation();if(confirm(`Delete "${note.name}"?`)){fnData.todo=fnData.todo.filter(n=>n.name!==note.name);saveFN();renderFN();updateFNStats();renderFNPanel();}
    });
    row.addEventListener('dragstart',()=>{dragFNNote=note.name;setTimeout(()=>row.classList.add('dragging'),0);});
    row.addEventListener('dragend',()=>row.classList.remove('dragging'));
    tg.body.appendChild(row);
  });
  if(!fnData.todo||fnData.todo.length===0){const e=document.createElement('div');e.className='empty';e.textContent='All done!';tg.body.appendChild(e);}
  cont.appendChild(tg.group);

  // DONE
  const dg=makeCollapsible('Done',(fnData.done||[]).length+' completed',true,true);
  (fnData.done||[]).forEach(note=>{
    const row=document.createElement('div');row.className='nr done';
    const cb=document.createElement('input');cb.type='checkbox';cb.className='cb';cb.checked=true;
    const nn=document.createElement('span');nn.className='nn';nn.textContent=note.name;
    const dd=document.createElement('span');dd.className='donedate';dd.textContent=fmtShort(note.date);
    dd.style.cursor='pointer';dd.title='Click to edit date';
    dd.addEventListener('click',e=>{e.stopPropagation();openDateModal(note);});
    const del=document.createElement('button');del.className='delbtn';del.textContent='✕';
    cb.addEventListener('change',()=>markFNUndone(note.name));
    del.addEventListener('click',e=>{e.stopPropagation();if(confirm(`Remove "${note.name}" from done?`)){fnData.done=fnData.done.filter(n=>n.name!==note.name);saveFN();renderFN();updateFNStats();}});
    row.appendChild(cb);row.appendChild(nn);row.appendChild(dd);row.appendChild(del);
    dg.body.appendChild(row);
  });
  if(!fnData.done||fnData.done.length===0){const e=document.createElement('div');e.className='empty';e.textContent='Nothing completed yet';dg.body.appendChild(e);}
  cont.appendChild(dg.group);
}

function makeCollapsible(title,badge,muted,open){
  const group=document.createElement('div');group.className='group';
  const gh=document.createElement('div');gh.className='gh';
  gh.innerHTML=`<div class="gdot${muted?' muted':''}"></div><div class="gtitle">${title}</div><div class="gbadge">${badge}</div><div class="chev${open?' open':''}">▶</div>`;
  const body=document.createElement('div');body.className='gbody'+(open?' open':'');
  gh.addEventListener('click',()=>{body.classList.toggle('open');gh.querySelector('.chev').classList.toggle('open');});
  group.appendChild(gh);group.appendChild(body);
  return{group,body};
}

function updateFNStats(){
  const todo=(fnData.todo||[]).length,done=(fnData.done||[]).length,total=todo+done;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('fn-done').textContent=done;
  document.getElementById('fn-rem').textContent=todo;
  document.getElementById('fn-total').textContent=total;
  document.getElementById('fn-pct').textContent=pct+'%';
  document.getElementById('fn-prog').style.width=pct+'%';
}

// Get all FN note names currently scheduled anywhere in daily tasks
function getScheduledFNNames(){
  const scheduled=new Set();
  Object.values(dtData).forEach(day=>{
    if(!day)return;
    Object.values(day).forEach(block=>{
      if(!Array.isArray(block))return;
      block.forEach(t=>{if(t.isFN&&!t.done)scheduled.add(t.name);});
    });
  });
  return scheduled;
}

// FN panel on daily tasks page - only shows unscheduled notes
function renderFNPanel(){
  const body=document.getElementById('fn-panel-body');
  body.innerHTML='';
  const todo=fnData.todo||[];
  const scheduled=getScheduledFNNames();
  const unscheduled=todo.filter(n=>!scheduled.has(n.name));
  if(unscheduled.length===0){
    const e=document.createElement('div');e.className='empty';
    e.textContent=todo.length===0?'All file notes done!':'All notes scheduled';
    body.appendChild(e);return;
  }
  unscheduled.forEach(note=>{
    const row=document.createElement('div');row.className='fn-mini-row';row.draggable=true;
    row.innerHTML=`<span class="dh">⠿</span><span class="fn-mini-name">${note.name}</span><span class="fn-mini-hint">drag →</span>`;
    row.addEventListener('dragstart',()=>{dragFNNote=note.name;setTimeout(()=>row.classList.add('dragging'),0);});
    row.addEventListener('dragend',()=>row.classList.remove('dragging'));
    body.appendChild(row);
  });
}

// Date modal
function openDateModal(note){
  dateModalNote=note;
  document.getElementById('dm-date').value=note.date||todayStr();
  document.getElementById('date-modal').classList.add('show');
}
window.closeDateModal=function(){document.getElementById('date-modal').classList.remove('show');dateModalNote=null;};
window.saveDateModal=function(){
  if(dateModalNote){dateModalNote.date=document.getElementById('dm-date').value;saveFN();renderFN();}
  window.closeDateModal();
};

// ── DAILY TASKS ────────────────────────────────────────────
const BLOCKS=[
  {id:'morning',label:'Morning',color:'var(--morning)'},
  {id:'afternoon',label:'Afternoon',color:'var(--afternoon)'},
  {id:'evening',label:'Evening',color:'var(--evening)'},
];

function saveDT(){dtSaving=true;setSync('syncing');set(dtRef,dtData).then(()=>{setSync('synced');dtSaving=false;});}
function ensureDate(d){if(!dtData[d])dtData[d]={};BLOCKS.forEach(b=>{if(!dtData[d][b.id])dtData[d][b.id]=[];});}

function renderDT(){
  document.getElementById('dinput').value=curDate;
  document.getElementById('daylabel').textContent=fmtDate(curDate);
  ensureDate(curDate);
  const cont=document.getElementById('dt-blocks');cont.innerHTML='';
  const day=dtData[curDate];

  BLOCKS.forEach(block=>{
    const tasks=day[block.id]||[];
    const doneCt=tasks.filter(t=>t.done).length;
    const group=document.createElement('div');group.className='group';

    const bh=document.createElement('div');bh.className='bh';
    bh.innerHTML=`<div class="bdot" style="background:${block.color}"></div><div class="btitle" style="color:${block.color}">${block.label}</div><div class="gbadge">${doneCt}/${tasks.length}</div>`;
    group.appendChild(bh);

    const blockBody=document.createElement('div');blockBody.className='block-body';

    // Drop zone for file notes
    blockBody.addEventListener('dragover',e=>{e.preventDefault();blockBody.classList.add('drag-over');});
    blockBody.addEventListener('dragleave',()=>blockBody.classList.remove('drag-over'));
    blockBody.addEventListener('drop',e=>{
      e.preventDefault();blockBody.classList.remove('drag-over');
      if(dragFNNote){
        day[block.id].push({name:dragFNNote,done:false,isFN:true});
        dragFNNote=null;saveDT();renderDT();
      }
    });

    if(tasks.length===0){const em=document.createElement('div');em.className='empty';em.textContent='Drop file notes here or add tasks';blockBody.appendChild(em);}
    else{
      tasks.forEach(task=>{
        const row=document.createElement('div');row.className='task-row'+(task.done?' done':'');
        const cb=document.createElement('input');cb.type='checkbox';cb.className='cb';cb.checked=task.done;
        const tn=document.createElement('span');tn.className='tname';tn.textContent=task.name;
        const del=document.createElement('button');del.className='delbtn';del.textContent='✕';
        if(task.isFN){const tag=document.createElement('span');tag.className='fn-tag';tag.textContent='FN';row.appendChild(tag);}
        row.appendChild(cb);row.appendChild(tn);row.appendChild(del);

        cb.addEventListener('change',e=>{
          task.done=e.target.checked;
          if(task.isFN&&task.done){markFNDone(task.name,curDate);}
          else if(task.isFN&&!task.done){markFNUndone(task.name);}
          saveDT();renderDT();
        });
        del.addEventListener('click',e=>{
          e.stopPropagation();
          if(confirm(`Remove "${task.name}"?`)){day[block.id]=day[block.id].filter(t=>t.name!==task.name);saveDT();renderDT();renderFNPanel();}
        });
        tn.addEventListener('click',e=>{
          const inp=document.createElement('input');inp.className='nedit';inp.value=task.name;
          tn.replaceWith(inp);inp.focus();inp.select();
          const fin=()=>{const v=inp.value.trim();if(v)task.name=v;saveDT();renderDT();};
          inp.addEventListener('blur',fin);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=task.name;inp.blur();}});
        });
        blockBody.appendChild(row);
      });
    }

    const ia=document.createElement('div');ia.className='inline-add';
    ia.innerHTML=`<input type="text" placeholder="Add task..."><button>Add</button>`;
    const iinp=ia.querySelector('input');
    const doAdd=()=>{const v=iinp.value.trim();if(!v)return;day[block.id].push({name:v,done:false});saveDT();renderDT();};
    ia.querySelector('button').addEventListener('click',doAdd);
    iinp.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});

    group.appendChild(blockBody);group.appendChild(ia);
    cont.appendChild(group);
  });

  renderFNPanel();
}

window.chDate=function(n){const d=new Date(curDate+'T00:00:00');d.setDate(d.getDate()+n);curDate=d.toISOString().slice(0,10);renderDT();};
window.onDChange=function(){curDate=document.getElementById('dinput').value;renderDT();};
window.goToday=function(){curDate=todayStr();renderDT();};

// ── TABS ───────────────────────────────────────────────────
window.switchTab=function(t){
  ['dt','fn'].forEach(x=>{
    document.getElementById('page-'+x).classList.toggle('active',x===t);
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  document.getElementById('fab').style.display=t==='fn'?'':'none';
};

// ── MODAL ──────────────────────────────────────────────────
window.openModal=function(){document.getElementById('m-name').value='';document.getElementById('modal').classList.add('show');document.getElementById('m-name').focus();};
window.closeModal=function(){document.getElementById('modal').classList.remove('show');};
window.addNote=function(){
  const name=document.getElementById('m-name').value.trim();if(!name)return;
  fnData.todo.push({name});saveFN();renderFN();renderFNPanel();updateFNStats();closeModal();
};
document.getElementById('m-name').addEventListener('keydown',e=>{if(e.key==='Enter')window.addNote();if(e.key==='Escape')window.closeModal();});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))window.closeModal();});

// ── FIREBASE ───────────────────────────────────────────────
onValue(fnRef,snap=>{
  if(fnSaving)return;
  const d=snap.val();
  fnData=d&&Array.isArray(d.todo)?d:defaultFN();
  if(!fnData.todo)fnData.todo=[];if(!fnData.done)fnData.done=[];
  setSync('synced');renderFN();updateFNStats();renderFNPanel();
},{onlyOnce:false});

onValue(dtRef,snap=>{
  if(dtSaving)return;
  dtData=snap.val()||{};renderDT();
},{onlyOnce:false});

</script>
</body>
</html>
